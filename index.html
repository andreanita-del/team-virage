function getUserById(id) { return TEAM_MEMBERS.find(u => u.id === id); }

function getPersonCost(event, personId) {
  let t = 0;
  event.columns.forEach(col => {
    const f = [...col.outbound, ...col.return].find(a => a.personId === personId);
    if (f && col.price) t += col.price;
  });
  return t;
}

function getEventPeople(event) {
  const ids = new Set();
  event.columns.forEach(col => [...col.outbound, ...col.return].forEach(a => ids.add(a.personId)));
  return [...ids].map(getUserById).filter(Boolean);
}

function getEventTotals(event) {
  let f = 0, r = 0, o = 0;
  event.columns.forEach(col => {
    const c = col.outbound.length + col.return.length;
    const v = (col.price || 0) * c;
    if (col.type === "vuelo" || col.type === "tren") f += v;
    else if (col.type === "rental") r += v;
    else o += v;
  });
  return { flights: f, rentals: r, other: o, total: f + r + o };
}

function App() {
  const [user,         setUser]       = useState(TEAM_MEMBERS.find(u=>u.id===17));
  const [tab,          setTab]        = useState("compras");
  const [showHome,     setShowHome]   = useState(true);
  const [orders,       setOrders]     = useState(INITIAL_ORDERS);
  const [events,       setEvents]     = useState(INITIAL_EVENTS);
  const [upo,          setUpo]        = useState(false);
  const [toast,        setToast]      = useState(null);
  const [newForm,      setNewForm]    = useState({ title:"", notes:"" });
  const [showNewRow,   setShowNewRow] = useState(false);
  const [newRow,       setNewRow]     = useState({ description:"", provider:"", remark:"", car:"", category:"", dateOrdered:"", dateNeeded:"", qty:1, price:0, paymentChannel:"", paymentBy:"", followUp:"", comment:"", invoice:"", status:"to_place" });
  const [filterSt,     setFilterSt]   = useState("all");
  const [selEvent,     setSelEvent]   = useState(null);
  const [personModal,  setPersonModal]= useState(null);
  const [dirNote,      setDirNote]    = useState("");
  const [notifs,       setNotifs]     = useState(INITIAL_ORDERS.filter(o => o.needsPhilippe && !o.approvedBy).map(o => ({ id:o.id, desc:o.description, price:o.price*o.qty })));
  const [teamNotifs,   setTeamNotifs] = useState([]);

  const isAdmin       = user.role === "admin";
  const isDirector    = user.role === "director";
  const isTeam        = user.role === "team";
  const isLogAdmin    = [8,16,17,21,22].includes(user.id); // Pierre R, Vanina, Philippe, Julien, Andrea
  const pendingPhil  = orders.filter(o => o.needsPhilippe && !o.approvedBy).length;
  const pendingEvts  = events.filter(e => e.status === "pendiente_director").length;
  const myTeamNotifs = teamNotifs.filter(n => n.assignedTo === user.name && !n.read);
  const filteredOrders = filterSt === "all" ? orders : orders.filter(o => o.status === filterSt);
  const grandTotal   = orders.reduce((s, o) => s + o.price * o.qty, 0);
  const evtSel       = selEvent ? events.find(e => e.id === selEvent) : null;

  const showToast = (msg, type = "ok") => { setToast({ msg, type }); setTimeout(() => setToast(null), 3000); };

  const approveOrder = (id) => {
    const o = orders.find(x => x.id === id); if (!o) return;
    const t = o.price * o.qty;
    if (t > APPROVAL_LIMIT && !isDirector) {
      setOrders(orders.map(x => x.id === id ? { ...x, needsPhilippe:true, approvedBy:"" } : x));
      setNotifs(prev => [...prev, { id, desc:o.description, price:t }]);
      showToast("⚠️ +200€ — Enviado a Philippe", "warn");
    } else {
      setOrders(orders.map(x => x.id === id ? { ...x, approvedBy:isDirector?"Philippe":user.name, needsPhilippe:false } : x));
      setNotifs(prev => prev.filter(n => n.id !== id));
      showToast(`✅ Aprobado por ${isDirector ? "Philippe" : user.name}`);
    }
  };

  const updateField  = (id, field, val) => setOrders(orders.map(o => o.id === id ? { ...o, [field]:val } : o));
  const updateStatus = (id, status)      => { setOrders(orders.map(o => o.id === id ? { ...o, status } : o)); showToast("Estado actualizado ✓"); };

  const addNewRow = () => {
    if (!newRow.description.trim()) return;
    const t = (parseFloat(newRow.price)||0) * (parseInt(newRow.qty)||1);
    const np = t > APPROVAL_LIMIT;
    const no = { ...newRow, id:Date.now(), qty:parseInt(newRow.qty)||1, price:parseFloat(newRow.price)||0, approvedBy:"", needsPhilippe:np };
    setOrders([...orders, no]);
    if (np) { setNotifs(prev => [...prev, { id:no.id, desc:no.description, price:t }]); showToast("⚠️ +200€ — Notificación a Philippe", "warn"); }
    else showToast("Pedido añadido ✓");
    setNewRow({ description:"", provider:"", remark:"", car:"", category:"", dateOrdered:"", dateNeeded:"", qty:1, price:0, paymentChannel:"", paymentBy:"", followUp:"", comment:"", invoice:"", status:"to_place" });
    setShowNewRow(false);
  };

  const submitRequest = () => {
    if (!newForm.title.trim()) return;
    const assignedTo = user.subrole === "ingeniero" ? "Laura C" : user.subrole === "mecanico" ? "Gabi" : "Vanina";
    const no = { id:Date.now(), description:newForm.title, provider:"", remark:newForm.notes, car:"", category:"", dateOrdered:new Date().toLocaleDateString("es-ES",{day:"numeric",month:"numeric",year:"2-digit"}), dateNeeded:"", qty:1, price:0, paymentChannel:"", paymentBy:"", followUp:"", comment:"", invoice:"", status:"to_place", approvedBy:"", needsPhilippe:false, requestedBy:user.name, assignedTo };
    setOrders([...orders, no]);
    setTeamNotifs(prev => [...prev, { id:no.id, desc:no.description, from:user.name, assignedTo, read:false }]);
    setNewForm({ title:"", notes:"" });
    showToast(`Solicitud enviada a ${assignedTo} ✓`);
  };

  const approveEvent = (id) => { setEvents(events.map(e => e.id === id ? { ...e, status:"aprobado", approvedBy:"Philippe", directorNote:dirNote } : e)); setDirNote(""); showToast("Evento aprobado ✓"); };
  const rejectEvent  = (id) => { setEvents(events.map(e => e.id === id ? { ...e, status:"rechazado", directorNote:dirNote } : e)); setDirNote(""); showToast("Rechazado", "err"); };

  const personMod = personModal ? (() => {
    const evt = events.find(e => e.id === personModal.eventId);
    const person = getUserById(personModal.personId);
    if (!evt || !person) return null;
    const items = [];
    evt.columns.forEach(col => {
      const ob = col.outbound.find(a => a.personId === personModal.personId);
      const re = col.return.find(a => a.personId === personModal.personId);
      if (ob) items.push({ dir:"IDA", col, assignment:ob });
      if (re) items.push({ dir:"VUELTA", col, assignment:re });
    });
    return { evt, person, items };
  })() : null;

  return (
    <div style={{ fontFamily:"'Inter',system-ui,sans-serif", background:"#0F0F13", minHeight:"100vh", color:"#E4E4E7" }}>

      {/* Home screen */}
      {showHome && (
        <div style={{ minHeight:"100vh", background:"#0F0F13", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24, position:"relative" }}>
          {/* Avatar top right */}
          <div onClick={() => setUpo(true)} style={{ position:"absolute", top:16, right:16, display:"flex", alignItems:"center", gap:6, cursor:"pointer", background:"#27272A", borderRadius:10, padding:"5px 10px" }}>
            <div style={{ width:26, height:26, borderRadius:"50%", background:isDirector?"#10B981":isAdmin?"#F97316":"#52525B", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:10, color:"white" }}>{user.avatar}</div>
            <span style={{ fontSize:11, color:"#71717A" }}>▼</span>
          </div>
          <div style={{ marginBottom:32, textAlign:"center" }}>
            <img src={VIRAGE_LOGO} style={{ width:120, height:120, objectFit:"contain", marginBottom:8 }} alt="Virage"/>
            <div style={{ fontSize:13, color:"#71717A" }}>Selecciona una sección</div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, width:"100%", maxWidth:400 }}>
            {[
              { key:"compras",   icon:"🔧", label:"Compras",   desc:"Pedidos y material",      color:"#6366F1" },
              { key:"logistica", icon:"✈️", label:"Logística", desc:"Eventos y viajes",         color:"#F97316" },
              { key:"tarjetas",  icon:"💳", label:"Tarjetas",  desc:"Gastos con tarjeta",       color:"#8B5CF6" },
              { key:"staff",     icon:"👥", label:"Staff",     desc:"Calendario y tareas",      color:"#10B981" },
            ].map(s => (
              <div key={s.key} onClick={() => { setTab(s.key); setShowHome(false); }}
                style={{ background:"#18181B", border:`1px solid ${s.color}44`, borderTop:`3px solid ${s.color}`, borderRadius:16, padding:24, cursor:"pointer", textAlign:"center", transition:"all .15s" }}
                onMouseEnter={e => e.currentTarget.style.background="#27272A"}
                onMouseLeave={e => e.currentTarget.style.background="#18181B"}>
                <div style={{ fontSize:32, marginBottom:10 }}>{s.icon}</div>
                <div style={{ fontWeight:800, fontSize:16, color:"#FAFAFA", marginBottom:4 }}>{s.label}</div>
                <div style={{ fontSize:12, color:"#71717A" }}>{s.desc}</div>
              </div>
            ))}
          </div>

        </div>
      )}

      {/* Toast */}
      {toast && <div style={{ position:"fixed", top:20, right:20, zIndex:999, background:toast.type==="err"?"#EF4444":toast.type==="warn"?"#F97316":"#10B981", color:"white", padding:"12px 20px", borderRadius:10, fontWeight:600, fontSize:14, boxShadow:"0 8px 32px rgba(0,0,0,.5)", maxWidth:320 }}>{toast.msg}</div>}

      {/* Person modal */}
      {personMod && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.75)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }} onClick={() => setPersonModal(null)}>
          <div style={{ background:"#18181B", border:"1px solid #27272A", borderRadius:16, padding:24, maxWidth:400, width:"100%", maxHeight:"80vh", overflowY:"auto" }} onClick={e => e.stopPropagation()}>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
              <div style={{ width:42, height:42, borderRadius:"50%", background:"#6366F1", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:14 }}>{personMod.person.avatar}</div>
              <div>
                <div style={{ fontWeight:800, fontSize:17, color:"#FAFAFA" }}>{personMod.person.name}</div>
                <div style={{ fontSize:12, color:"#71717A" }}>{personMod.evt.name}</div>
              </div>
            </div>
            {personMod.items.length === 0 && <div style={{ color:"#52525B", fontSize:14, textAlign:"center", padding:20 }}>Sin detalles asignados</div>}
            {personMod.items.map((item, i) => (
              <div key={i} style={{ background:"#0F0F13", borderRadius:10, padding:14, marginBottom:10, borderLeft:`3px solid ${TYPE_COLOR[item.col.type]||"#6366F1"}` }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                  <span style={{ fontSize:11, fontWeight:700, color:TYPE_COLOR[item.col.type], letterSpacing:"0.06em" }}>{item.dir}</span>
                  <span style={{ fontSize:11, color:"#71717A" }}>{item.col.departureDate}</span>
                </div>
                <div style={{ fontWeight:700, fontSize:14, color:"#FAFAFA", marginBottom:4 }}>{TRANSPORT_TYPES.find(t => t.key === item.col.type)?.icon} {item.col.label}</div>
                {item.col.route    && <div style={{ fontSize:13, color:"#A1A1AA" }}>✈️ {item.col.route} · {item.col.time}</div>}
                {item.col.flightNo && <div style={{ fontSize:12, color:"#71717A", marginTop:2 }}>Vuelo: {item.col.flightNo} · Código: {item.col.flightCode}</div>}
                {item.col.eta      && <div style={{ fontSize:12, color:"#71717A", marginTop:2 }}>ETA: {item.col.eta}</div>}
                {item.assignment.hotel && (
                  <div style={{ marginTop:8, paddingTop:8, borderTop:"1px solid #27272A" }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#FAFAFA", marginBottom:4 }}>🏨 {item.assignment.hotel}</div>
                    {item.assignment.hotelRoom && <div style={{ fontSize:12, color:"#A1A1AA" }}>🛏 {item.assignment.hotelRoom}</div>}
                    {item.assignment.hotelRoommates && <div style={{ fontSize:12, color:"#71717A", marginTop:2 }}>Con: {item.assignment.hotelRoommates}</div>}
                    {item.assignment.hotelCheckin && <div style={{ fontSize:12, color:"#71717A", marginTop:2 }}>Check-in: {item.assignment.hotelCheckin} · Check-out: {item.assignment.hotelCheckout}</div>}
                    {isLogAdmin && item.assignment.hotelPrice && <div style={{ fontSize:13, fontWeight:700, color:"#10B981", marginTop:6 }}>💰 Hotel: {item.assignment.hotelPrice}€</div>}
                  </div>
                )}
                {isLogAdmin && item.col.type==="rental" && item.col.price && (
                  <div style={{ marginTop:6, paddingTop:6, borderTop:"1px solid #27272A" }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#EC4899" }}>🚗 Alquiler: {item.col.price}€/pers</div>
                  </div>
                )}
                {isLogAdmin && item.col.price && <div style={{ marginTop:8, fontWeight:700, color:"#10B981", fontSize:14 }}>{item.col.price}€/pers</div>}
              </div>
            ))}
            <button onClick={() => setPersonModal(null)} style={{ width:"100%", marginTop:4, padding:11, borderRadius:9, background:"#27272A", border:"none", color:"#A1A1AA", fontWeight:600, cursor:"pointer", fontSize:13 }}>Cerrar</button>
          </div>
        </div>
      )}

      {/* User picker */}
      {upo && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.75)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }} onClick={() => setUpo(false)}>
          <div style={{ background:"#18181B", border:"1px solid #27272A", borderRadius:16, padding:20, maxWidth:340, width:"100%", maxHeight:"80vh", overflowY:"auto" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight:800, fontSize:16, color:"#FAFAFA", marginBottom:16 }}>¿Quién eres?</div>
            {TEAM_MEMBERS.map(u => (
              <div key={u.id} onClick={() => { setUser(u); setUpo(false); setSelEvent(null); }}
                style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 12px", borderRadius:10, cursor:"pointer", background:user.id===u.id?"#6366F120":"transparent", border:user.id===u.id?"1px solid #6366F1":"1px solid transparent", marginBottom:4 }}>
                <div style={{ width:34, height:34, borderRadius:"50%", background:u.role==="director"?"#10B981":u.role==="admin"?"#F97316":"#52525B", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:12, flexShrink:0 }}>{u.avatar}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:600, fontSize:14, color:"#FAFAFA" }}>{u.name}</div>
                  <div style={{ fontSize:11, color:"#71717A" }}>{u.role==="director"?"Director":u.role==="admin"?"Admin":"Equipo"}</div>
                </div>
                {user.id === u.id && <div style={{ color:"#6366F1", fontSize:16 }}>✓</div>}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Header */}
      {!showHome && <div style={{ background:"#18181B", borderBottom:"1px solid #27272A", padding:"0 12px", position:"sticky", top:0, zIndex:100 }}>
        <div style={{ display:"flex", alignItems:"center", height:46, gap:8 }}>
          {/* Avatar izquierda */}
          <div onClick={() => setUpo(true)} style={{ display:"flex", alignItems:"center", gap:5, cursor:"pointer", background:"#27272A", borderRadius:8, padding:"4px 8px", flexShrink:0 }}>
            <div style={{ width:24, height:24, borderRadius:"50%", background:isDirector?"#10B981":isAdmin?"#F97316":"#52525B", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:10, color:"white" }}>{user.avatar}</div>
            <span style={{ fontSize:10, color:"#71717A" }}>▼</span>
          </div>
          {/* Notif bells */}
          {isDirector && pendingPhil > 0 && (
            <div style={{ position:"relative", cursor:"pointer", flexShrink:0 }} onClick={() => setTab("compras")}>
              <span style={{ fontSize:16 }}>🔔</span>
              <div style={{ position:"absolute", top:-3, right:-3, background:"#EF4444", color:"white", borderRadius:"50%", width:13, height:13, fontSize:8, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center" }}>{pendingPhil}</div>
            </div>
          )}
          {isAdmin && myTeamNotifs.length > 0 && (
            <div style={{ position:"relative", cursor:"pointer", flexShrink:0 }} onClick={() => setTab("compras")}>
              <span style={{ fontSize:16 }}>🔔</span>
              <div style={{ position:"absolute", top:-3, right:-3, background:"#6366F1", color:"white", borderRadius:"50%", width:13, height:13, fontSize:8, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center" }}>{myTeamNotifs.length}</div>
            </div>
          )}
          {/* Back to home */}
          <button onClick={() => setShowHome(true)} style={{ background:"transparent", border:"none", color:"#71717A", cursor:"pointer", fontSize:13, padding:"4px 8px" }}>← Inicio</button>
          {/* Tabs */}
          <div style={{ display:"flex", gap:2, flex:1, justifyContent:"flex-end" }}>
            {[{ key:"compras", label:"🔧 Compras" }, { key:"logistica", label:"✈️ Logística" }, { key:"tarjetas", label:"💳 Tarjetas" }, { key:"staff", label:"👥 Staff" }].map(t => (
              <button key={t.key} onClick={() => setTab(t.key)} style={{ padding:"5px 10px", borderRadius:7, fontSize:11, fontWeight:600, border:"none", cursor:"pointer", background:tab===t.key?"#6366F1":"transparent", color:tab===t.key?"white":"#71717A", whiteSpace:"nowrap" }}>{t.label}</button>
            ))}
          </div>
        </div>
      </div>}

      {/* ══ COMPRAS ══ */}
      {!showHome && tab === "compras" && (
        <div>
          {isTeam && (
            <div style={{ maxWidth:500, margin:"40px auto", padding:"0 20px" }}>
              <div style={{ background:"#18181B", border:"1px solid #27272A", borderRadius:14, padding:24 }}>
                <h2 style={{ margin:"0 0 6px", fontSize:20, fontWeight:800, color:"#FAFAFA" }}>¿Qué necesitas?</h2>
                <p style={{ margin:"0 0 20px", fontSize:13, color:"#71717A" }}>Descríbelo y nos encargamos de encontrarlo.</p>
                <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                  <div><label style={lbl}>QUÉ NECESITAS *</label><input value={newForm.title} onChange={e => setNewForm({ ...newForm, title:e.target.value })} placeholder="Ej: tuerca M10, pastillas de freno..." style={inp}/></div>
                  <div><label style={lbl}>MÁS DETALLES</label><textarea value={newForm.notes} onChange={e => setNewForm({ ...newForm, notes:e.target.value })} placeholder="Cantidad, para qué, urgencia..." rows={3} style={{ ...inp, resize:"vertical" }}/></div>
                  <button onClick={submitRequest} disabled={!newForm.title.trim()} style={{ padding:14, borderRadius:10, border:"none", fontWeight:800, fontSize:15, cursor:"pointer", background:newForm.title.trim()?"#6366F1":"#27272A", color:newForm.title.trim()?"white":"#52525B" }}>Enviar solicitud →</button>
                </div>
              </div>
            </div>
          )}

          {(isAdmin || isDirector) && (
            <div style={{ padding:"14px" }}>
              {/* Team notifs banner */}
              {isAdmin && myTeamNotifs.length > 0 && (
                <div style={{ background:"#6366F120", border:"1px solid #6366F1", borderRadius:10, padding:"12px 16px", marginBottom:14 }}>
                  <div style={{ fontWeight:700, fontSize:14, color:"#6366F1", marginBottom:8 }}>🔔 {myTeamNotifs.length} solicitud{myTeamNotifs.length > 1 ? "es" : ""} nueva{myTeamNotifs.length > 1 ? "s" : ""} del equipo</div>
                  {myTeamNotifs.map(n => (
                    <div key={n.id} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"#18181B", borderRadius:8, padding:"8px 12px", marginBottom:6 }}>
                      <div>
                        <div style={{ fontWeight:600, fontSize:13, color:"#FAFAFA" }}>{n.desc}</div>
                        <div style={{ fontSize:12, color:"#71717A" }}>Pedido por {n.from}</div>
                      </div>
                      <button onClick={() => setTeamNotifs(prev => prev.map(x => x.id === n.id ? { ...x, read:true } : x))} style={{ padding:"5px 12px", borderRadius:7, background:"#6366F1", border:"none", color:"white", fontWeight:700, fontSize:12, cursor:"pointer" }}>Visto ✓</button>
                    </div>
                  ))}
                </div>
              )}

              {/* Philippe approval banner */}
              {isDirector && pendingPhil > 0 && (
                <div style={{ background:"#F9731620", border:"1px solid #F97316", borderRadius:10, padding:"12px 16px", marginBottom:14 }}>
                  <div style={{ fontWeight:700, fontSize:14, color:"#F97316", marginBottom:8 }}>🔔 {pendingPhil} pedido{pendingPhil > 1 ? "s" : ""} esperando tu aprobación (+200€)</div>
                  {orders.filter(o => o.needsPhilippe && !o.approvedBy).map(o => (
                    <div key={o.id} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"#18181B", borderRadius:8, padding:"8px 12px", marginBottom:6 }}>
                      <div>
                        <div style={{ fontWeight:600, fontSize:13, color:"#FAFAFA" }}>{o.description}</div>
                        <div style={{ fontSize:12, color:"#71717A" }}>{o.provider} · {(o.price*o.qty).toFixed(2)}€</div>
                      </div>
                      <button onClick={() => approveOrder(o.id)} style={{ padding:"6px 14px", borderRadius:8, background:"#10B981", border:"none", color:"white", fontWeight:800, fontSize:13, cursor:"pointer" }}>✅ OK Philippe</button>
                    </div>
                  ))}
                </div>
              )}

              {/* Filters */}
              <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:10, flexWrap:"wrap", gap:8 }}>
                <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                  {[["all","Todas"], ...Object.entries(ORDER_STATUS).map(([k,v]) => [k, v.label])].map(([k, label]) => (
                    <button key={k} onClick={() => setFilterSt(k)} style={{ padding:"4px 10px", borderRadius:20, fontSize:11, fontWeight:600, border:filterSt===k?"2px solid #6366F1":"1px solid #3F3F46", cursor:"pointer", background:k==="all"?filterSt===k?"#6366F1":"#27272A":ORDER_STATUS[k]?.bg||"#27272A", color:k==="all"?filterSt===k?"white":"#A1A1AA":ORDER_STATUS[k]?.text||"#E4E4E7", whiteSpace:"nowrap" }}>{label}</button>
                  ))}
                </div>
                {isAdmin && <button onClick={() => setShowNewRow(true)} style={{ padding:"7px 16px", borderRadius:8, background:"#6366F1", border:"none", color:"white", fontWeight:700, fontSize:13, cursor:"pointer", whiteSpace:"nowrap" }}>+ Añadir pedido</button>}
              </div>

              {/* Total */}
              <div style={{ background:"#18181B", border:"1px solid #27272A", borderRadius:9, padding:"9px 14px", marginBottom:10, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span style={{ fontSize:12, color:"#71717A" }}>{orders.length} líneas</span>
                <span style={{ fontSize:17, fontWeight:800, color:"#FAFAFA" }}>Total: {grandTotal.toLocaleString("es-ES",{minimumFractionDigits:2})} €</span>
              </div>

              {/* Table */}
              <div style={{ background:"#18181B", border:"1px solid #27272A", borderRadius:12, overflow:"hidden" }}>
                <div style={{ display:"flex", overflow:"hidden" }}>
                  {/* Fixed description column */}
                  <div style={{ flexShrink:0, width:210, borderRight:"2px solid #3F3F46" }}>
                    <div style={{ background:"#0F172A", padding:"0 12px", fontSize:11, fontWeight:700, color:"#94A3B8", letterSpacing:"0.06em", borderBottom:"1px solid #27272A", height:36, display:"flex", alignItems:"center" }}>DESCRIPTION</div>
                    {showNewRow && <div style={{ background:"#1E293B", borderBottom:"1px solid #27272A", padding:"5px 8px" }}><input value={newRow.description} onChange={e => setNewRow({ ...newRow, description:e.target.value })} placeholder="Descripción..." style={{ ...inp, fontSize:12 }}/></div>}
                    {filteredOrders.map((o, i) => (
                      <div key={o.id} style={{ padding:"7px 10px", borderBottom:"1px solid #1F1F23", background:i%2===0?"#18181B":"#1C1C1F", display:"flex", alignItems:"center", minHeight:38, borderLeft:`4px solid ${ORDER_STATUS[o.status]?.border||"#52525B"}` }}>
                        <span style={{ fontSize:11, fontWeight:600, color:"#FAFAFA", lineHeight:1.3 }}>{o.description}</span>
                      </div>
                    ))}
                    <div style={{ padding:"7px 10px", background:"#EF4444", display:"flex", alignItems:"center", minHeight:34 }}><span style={{ fontSize:12, fontWeight:800, color:"white" }}>TOTAL</span></div>
                  </div>

                  {/* Scrollable columns */}
                  <div style={{ overflowX:"auto", flex:1 }}>
                    <div style={{ minWidth:COLS.reduce((s,c) => s+c.w, 0) }}>
                      <div style={{ display:"flex", background:"#0F172A", borderBottom:"1px solid #27272A", height:36 }}>
                        {COLS.map(col => <div key={col.key} style={{ flexShrink:0, width:col.w, padding:"0 8px", fontSize:10, fontWeight:700, color:"#94A3B8", letterSpacing:"0.06em", display:"flex", alignItems:"center", borderRight:"1px solid #1F1F23" }}>{col.label}</div>)}
                      </div>
                      {showNewRow && (
                        <div style={{ display:"flex", background:"#1E293B", borderBottom:"1px solid #27272A" }}>
                          {COLS.map(col => (
                            <div key={col.key} style={{ flexShrink:0, width:col.w, padding:"4px 5px", borderRight:"1px solid #1F1F23" }}>
                              {col.key === "status" ? (
                                <div style={{ display:"flex", gap:4 }}>
                                  <select value={newRow.status} onChange={e => setNewRow({ ...newRow, status:e.target.value })} style={{ ...inp, fontSize:10, padding:"3px 4px" }}>{Object.entries(ORDER_STATUS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}</select>
                                  <button onClick={addNewRow} style={{ padding:"3px 7px", borderRadius:5, background:"#6366F1", border:"none", color:"white", fontWeight:700, fontSize:11, cursor:"pointer" }}>✓</button>
                                </div>
                              ) : col.key === "approvedBy" ? <span style={{ fontSize:10, color:"#52525B" }}>auto</span>
                              : <input value={newRow[col.key]||""} onChange={e => setNewRow({ ...newRow, [col.key]:e.target.value })} style={{ ...inp, fontSize:11 }}/>}
                            </div>
                          ))}
                        </div>
                      )}
                      {filteredOrders.map((o, i) => {
                        const rowTotal = o.price * o.qty;
                        const needsApproval = rowTotal > APPROVAL_LIMIT && !o.approvedBy && isAdmin;
                        return (
                          <div key={o.id} style={{ display:"flex", background:i%2===0?"#18181B":"#1C1C1F", borderBottom:"1px solid #1F1F23", minHeight:38 }}>
                            {COLS.map(col => (
                              <div key={col.key} style={{ flexShrink:0, width:col.w, padding:"5px 8px", borderRight:"1px solid #1F1F23", display:"flex", alignItems:"center" }}>
                                {col.key === "remark" && o[col.key]?.startsWith("http") ? (
                                  <a href={o[col.key]} target="_blank" rel="noreferrer" style={{ color:"#6366F1", fontSize:11, fontWeight:600, textDecoration:"none" }}>🔗 link</a>
                                ) : col.key === "status" ? (
                                  isAdmin ? (
                                    <select value={o.status} onChange={e => updateStatus(o.id, e.target.value)} style={{ ...inp, fontSize:10, padding:"3px 5px", background:ORDER_STATUS[o.status]?.bg, color:ORDER_STATUS[o.status]?.text, fontWeight:700, borderColor:ORDER_STATUS[o.status]?.border, cursor:"pointer" }}>
                                      {Object.entries(ORDER_STATUS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
                                    </select>
                                  ) : <span style={{ fontSize:10, fontWeight:700, padding:"2px 6px", borderRadius:20, background:ORDER_STATUS[o.status]?.bg, color:ORDER_STATUS[o.status]?.text, whiteSpace:"nowrap" }}>{ORDER_STATUS[o.status]?.label}</span>
                                ) : col.key === "approvedBy" ? (
                                  <div style={{ display:"flex", alignItems:"center", gap:4 }}>

                                    : <button onClick={() => approveOrder(o.id)} style={{ padding:"3px 9px", borderRadius:6, background:"#10B981", border:"none", color:"white", fontWeight:700, fontSize:11, cursor:"pointer" }}>✅ OK</button>}
                                  </div>
                                ) : col.key === "price" ? (

                                  <input value={o[col.key]||""} onChange={e => updateField(o.id, col.key, e.target.value)}

                                    onFocus={e => { e.target.style.borderBottom="1px solid #6366F1"; e.target.style.background="#0F0F13"; }}
                                    onBlur={e  => { e.target.style.borderBottom="1px solid transparent"; e.target.style.background="transparent"; }}/>
                                ) : <span style={{ fontSize:11, color:"#D4D4D8", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{o[col.key]||"—"}</span>}
                              </div>
                            ))}
                          </div>
                        );
                      })}
                      <div style={{ display:"flex", background:"#EF4444", minHeight:34 }}>
                        {COLS.map(col => <div key={col.key} style={{ flexShrink:0, width:col.w, padding:"5px 8px", borderRight:"1px solid #C53030", display:"flex", alignItems:"center" }}>{col.key === "price" && <span style={{ fontSize:12, fontWeight:800, color:"white" }}>{grandTotal.toLocaleString("es-ES",{minimumFractionDigits:2})}€</span>}</div>)}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

        <div style={{ padding:"20px" }}>

            <div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>

              </div>
              {events.map(ev => {
                const totals = getEventTotals(ev);
                const people = getEventPeople(ev);
                const sc = ev.status==="aprobado"?"#10B981":ev.status==="rechazado"?"#EF4444":"#F97316";
                const sl = ev.status==="aprobado"?"✅ Philippe":ev.status==="rechazado"?"✕ Rechazado":"⏳ Pendiente Philippe";
                return (
                  <div key={ev.id} onClick={() => setSelEvent(ev.id)} style={{ background:"#18181B", border:"1px solid #27272A", borderLeft:`3px solid ${sc}`, borderRadius:12, padding:18, cursor:"pointer", marginBottom:10 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                      <div>
                        <div style={{ fontWeight:800, fontSize:17, color:"#FAFAFA" }}>{ev.name}</div>
                        <div style={{ fontSize:12, color:"#71717A", marginTop:2 }}>📍 {ev.location} · {ev.dateStart} → {ev.dateEnd}</div>

                      <div style={{ textAlign:"right" }}>
                        {isLogAdmin && <div style={{ fontWeight:800, fontSize:20, color:"#FAFAFA" }}>{totals.total.toFixed(0)}€</div>}
                        <div style={{ fontSize:12, fontWeight:700, color:sc, marginTop:3 }}>{sl}</div>
                      </div>
                    </div>
                    {isLogAdmin && (() => {
                      const hotelTotal = people.reduce((s,p) => {
                        let ph = 0;
                        ev.columns.forEach(col => {
                          const found = [...col.outbound,...col.return].find(a=>a.personId===p.id);
                          if (found && found.hotelPrice) ph = found.hotelPrice;
                        });
                        return s + ph;
                      }, 0);
                      return (
                        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginTop:14 }}>
                          {[{ label:"✈️ Vuelos", value:totals.flights, accent:"#6366F1" }, { label:"🚗 Alquiler", value:totals.rentals, accent:"#EC4899" }, { label:"🏨 Hotel", value:hotelTotal, accent:"#F59E0B" }, { label:"💰 Total", value:totals.total+hotelTotal, accent:"#10B981" }].map((s,i) => (
                            <div key={i} style={{ background:"#0F0F13", borderRadius:9, padding:"8px 10px", borderLeft:`3px solid ${s.accent}` }}>
                              <div style={{ fontSize:10, color:"#71717A" }}>{s.label}</div>
                              <div style={{ fontSize:15, fontWeight:800, color:"#FAFAFA" }}>{s.value.toFixed(0)}€</div>
                            </div>
                          ))}
                        </div>
                      );
                    })()}
                  <div style={{ display:"flex", gap:16, marginTop:10, flexWrap:"wrap" }}>
                      <span style={{ fontSize:12, color:"#71717A" }}>👥 {people.length} personas</span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {selEvent && evtSel && (
            <div>
              <button onClick={() => setSelEvent(null)} style={{ background:"#27272A", border:"none", color:"#A1A1AA", padding:"6px 13px", borderRadius:7, cursor:"pointer", marginBottom:14, fontSize:12 }}>← Eventos</button>

              <div style={{ background:"#18181B", border:"1px solid #27272A", borderRadius:14, padding:20, marginBottom:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div>
                    <h2 style={{ margin:0, fontSize:20, fontWeight:800, color:"#FAFAFA" }}>{evtSel.name}</h2>
                    <div style={{ fontSize:13, color:"#71717A", marginTop:3 }}>📍 {evtSel.location} · {evtSel.dateStart} → {evtSel.dateEnd}</div>
                  </div>
                  <div style={{ fontSize:13, fontWeight:700, color:evtSel.status==="aprobado"?"#10B981":evtSel.status==="rechazado"?"#EF4444":"#F97316" }}>
                    {evtSel.status==="aprobado"?"✅ Philippe":evtSel.status==="rechazado"?"✕ Rechazado":"⏳ Pendiente Philippe"}
                  </div>
                </div>

                {(() => {
                  const t = getEventTotals(evtSel);
                  const people = getEventPeople(evtSel);
                  return (
                    <>
                      {isLogAdmin && (() => {
                        const hotelTotal = getEventPeople(evtSel).reduce((s,p) => {
                          let ph = 0;
                          evtSel.columns.forEach(col => {
                            const found = [...col.outbound,...col.return].find(a=>a.personId===p.id);
                            if (found && found.hotelPrice) ph = found.hotelPrice;
                          });
                          return s + ph;
                        }, 0);
                        return (
                          <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginTop:16, marginBottom:14 }}>
                            {[{ label:"✈️ Vuelos/Trenes", value:t.flights, accent:"#6366F1" }, { label:"🚗 Alquiler", value:t.rentals, accent:"#EC4899" }, { label:"🏨 Hotel", value:hotelTotal, accent:"#F59E0B" }, { label:"💰 Total", value:t.total+hotelTotal, accent:"#10B981" }].map((s, i) => (
                              <div key={i} style={{ background:"#0F0F13", borderRadius:10, padding:"10px 12px", borderLeft:`3px solid ${s.accent}` }}>
                                <div style={{ fontSize:10, color:"#71717A", marginBottom:3 }}>{s.label}</div>
                                <div style={{ fontSize:18, fontWeight:800, color:"#FAFAFA" }}>{s.value.toFixed(0)}€</div>
                              </div>
                            ))}
                          </div>
                        );
                      })()}

                      {isDirector && evtSel.status === "pendiente_director" && (
                        <div style={{ background:"#0F0F13", borderRadius:10, padding:14, marginTop:14 }}>
                          <label style={lbl}>NOTA (OPCIONAL)</label>
                          <input placeholder="Comentario..." style={{ ...inp, marginBottom:10 }} onChange={e => setDirNote(e.target.value)}/>
                          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                            <button onClick={() => rejectEvent(evtSel.id)} style={{ padding:13, borderRadius:9, background:"#27272A", border:"1px solid #EF4444", color:"#EF4444", fontWeight:700, fontSize:14, cursor:"pointer" }}>✕ Rechazar</button>
                            <button onClick={() => approveEvent(evtSel.id)} style={{ padding:13, borderRadius:9, background:"#10B981", border:"none", color:"white", fontWeight:800, fontSize:14, cursor:"pointer" }}>✅ Aprobar</button>
                          </div>
                        </div>
                      )}
                    </>
                  );
                })()}
              </div>

              {/* Logistics board */}
              <div style={{ overflowX:"auto" }}>
                <div style={{ minWidth:evtSel.columns.length * 165 + 90 }}>
                  <div style={{ display:"grid", gridTemplateColumns:`90px repeat(${evtSel.columns.length},165px)`, gap:6, marginBottom:6 }}>
                    <div/>
                    {evtSel.columns.map(col => (
                      <div key={col.id} style={{ background:TYPE_COLOR[col.type]+"22", border:`1px solid ${TYPE_COLOR[col.type]}44`, borderRadius:10, padding:"10px 12px", textAlign:"center" }}>
                        <div style={{ fontSize:14, marginBottom:2 }}>{TRANSPORT_TYPES.find(t => t.key === col.type)?.icon}</div>
                        <div style={{ fontSize:11, fontWeight:700, color:TYPE_COLOR[col.type], lineHeight:1.3 }}>{col.label}</div>
                        <div style={{ fontSize:10, color:"#71717A", marginTop:2 }}>{col.departureDate}</div>
                        {col.eta   && <div style={{ fontSize:10, color:"#52525B" }}>ETA: {col.eta}</div>}
                        {isLogAdmin && col.price && <div style={{ fontSize:11, fontWeight:700, color:"#10B981", marginTop:3 }}>{col.price}€/pers</div>}
                      </div>
                    ))}
                  </div>
                  {["outbound","return"].map(dir => (
                    <div key={dir} style={{ display:"grid", gridTemplateColumns:`90px repeat(${evtSel.columns.length},165px)`, gap:6, marginBottom:6 }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"center" }}>
                        <div style={{ background:"#27272A", borderRadius:8, padding:"6px 10px", fontSize:11, fontWeight:700, color:"#A1A1AA", textAlign:"center" }}>{dir==="outbound"?"🡆 IDA":"🡄 VUELTA"}</div>
                      </div>
                      {evtSel.columns.map(col => {
                        const assignments = col[dir] || [];
                        return (
                          <div key={col.id} style={{ background:"#18181B", border:"1px solid #27272A", borderRadius:10, padding:10, minHeight:60 }}>
                            {assignments.length === 0
                              ? <div style={{ color:"#3F3F46", fontSize:11, textAlign:"center", marginTop:10 }}>—</div>
                              : assignments.map(a => {
                                  const p = getUserById(a.personId);
                                  if (!p) return null;
                                  return (
                                    <div key={a.personId} onClick={() => setPersonModal({ eventId:evtSel.id, personId:p.id })} style={{ display:"flex", alignItems:"center", gap:5, marginBottom:5, cursor:"pointer", background:"#0F0F13", borderRadius:6, padding:"4px 7px" }}>
                                      <div style={{ width:22, height:22, borderRadius:"50%", background:TYPE_COLOR[col.type]||"#6366F1", display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, fontWeight:700, flexShrink:0 }}>{p.avatar}</div>
                                      <div style={{ fontSize:11, fontWeight:600, color:"#E4E4E7", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.name}</div>
                                    </div>
                                  );
                                })
                            }
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      )}
      {!showHome && tab === "tarjetas" && <TarjetasTab user={user} isAdmin={isAdmin||isDirector} />}
      {!showHome && tab === "staff" && <StaffTab user={user} isAdmin={isAdmin||isDirector} />}
    </div>
  );
}

function TarjetasTab({ user, isAdmin }) {
  const [expenses, setExpenses]     = useState(() => {
    const init = {};
    TARJETAS_DATA.forEach(t => { init[t.id] = [...t.gastos]; });
    return init;
  });
  const [showForm, setShowForm]     = useState(null); // tarjeta id
  const [editGasto, setEditGasto]   = useState(null);
  const [form, setForm]             = useState({ proveedor:"", categoria:"", desc:"", importe:"", fecha:new Date().toLocaleDateString("es-ES",{day:"numeric",month:"short",year:"numeric"}) });
  const [expanded, setExpanded]     = useState({});
  const [showAssign, setShowAssign] = useState(false);
  const [newCard, setNewCard]       = useState({ last4:"", titular:"", entregada:"", coche:"", evento:"" });
  const [cards, setCards]           = useState(TARJETAS_DATA);

  const inp2 = { background:"#1C1C1F", border:"1px solid #3F3F46", borderRadius:8, padding:"9px 12px", color:"#E4E4E7", fontSize:13, outline:"none", width:"100%", boxSizing:"border-box" };

  const myCard = cards.find(t => t.titular === user.name);
  const allGastos = cards.flatMap(t => (expenses[t.id]||[]).map(g => ({ ...g, titular:t.titular, last4:t.last4 })));
  const totalGastado = allGastos.reduce((s,g) => s+g.importe, 0);

  const addGasto = (cardId) => {
    if (!form.proveedor || !form.importe) return;
    const newG = { id:Date.now(), ...form, importe:parseFloat(form.importe), confirmado:false };
    setExpenses(prev => ({ ...prev, [cardId]: [...(prev[cardId]||[]), newG] }));
    setForm({ proveedor:"", categoria:"", desc:"", importe:"", fecha:new Date().toLocaleDateString("es-ES",{day:"numeric",month:"short",year:"numeric"}) });
    setShowForm(null);
  };

  const deleteGasto = (cardId, gastoId) => setExpenses(prev => ({ ...prev, [cardId]: prev[cardId].filter(g => g.id !== gastoId) }));
  const confirmGasto = (cardId, gastoId) => setExpenses(prev => ({ ...prev, [cardId]: prev[cardId].map(g => g.id===gastoId ? {...g,confirmado:true} : g) }));
  const addCard = () => {
    if (!newCard.last4 || !newCard.titular) return;
    const nc = { ...newCard, id:Date.now(), gastos:[] };
    setCards([...cards, nc]);
    setExpenses(prev => ({ ...prev, [nc.id]: [] }));
    setShowAssign(false);
    setNewCard({ last4:"", titular:"", entregada:"", coche:"", evento:"" });
  };

  // EMPLOYEE VIEW
  if (!isAdmin) {
    if (!myCard) return (
      <div style={{ maxWidth:500, margin:"60px auto", padding:"0 20px", textAlign:"center" }}>
        <div style={{ fontSize:40, marginBottom:12 }}>💳</div>
        <div style={{ color:"#71717A", fontSize:15 }}>No tienes ninguna tarjeta asignada</div>
      </div>
    );
    const myGastos = expenses[myCard.id] || [];
    const myTotal = myGastos.reduce((s,g) => s+g.importe, 0);
    return (
      <div style={{ maxWidth:500, margin:"0 auto", padding:"20px" }}>
        <div style={{ fontSize:11, fontWeight:700, color:"#71717A", letterSpacing:"0.1em", marginBottom:12 }}>MI TARJETA</div>
        {/* Card visual */}
        <div style={{ background:"linear-gradient(135deg,#6366F1,#8B5CF6,#A855F7)", borderRadius:20, padding:"28px 24px", marginBottom:24, position:"relative", overflow:"hidden" }}>
          <div style={{ position:"absolute", top:-20, right:-20, width:120, height:120, borderRadius:"50%", background:"rgba(255,255,255,0.08)" }}/>
          <div style={{ position:"absolute", bottom:-30, right:20, width:80, height:80, borderRadius:"50%", background:"rgba(255,255,255,0.05)" }}/>
          <div style={{ fontSize:18, letterSpacing:"0.2em", color:"white", marginBottom:20 }}>•••• •••• •••• {myCard.last4}</div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
            <div>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.6)", marginBottom:4 }}>Titular</div>
              <div style={{ fontSize:15, fontWeight:700, color:"white" }}>{myCard.titular}</div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.6)", marginBottom:4 }}>Entregada</div>
              <div style={{ fontSize:14, fontWeight:600, color:"white" }}>{myCard.entregada}</div>
            </div>
          </div>
        </div>

        {/* Gastos */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
          <div style={{ fontWeight:800, fontSize:17, color:"#FAFAFA" }}>Mis gastos</div>
          <div style={{ display:"flex", gap:8 }}>
            <button style={{ padding:"8px 16px", borderRadius:20, background:"transparent", border:"1px solid #10B981", color:"#10B981", fontWeight:600, fontSize:13, cursor:"pointer" }}>Devolver</button>
            <button onClick={() => setShowForm(myCard.id)} style={{ padding:"8px 16px", borderRadius:20, background:"#6366F1", border:"none", color:"white", fontWeight:700, fontSize:13, cursor:"pointer" }}>+ Gasto</button>
          </div>
        </div>

        {showForm === myCard.id && (
          <div style={{ background:"#18181B", border:"1px solid #27272A", borderRadius:14, padding:18, marginBottom:14 }}>
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              <input value={form.proveedor} onChange={e=>setForm({...form,proveedor:e.target.value})} placeholder="Proveedor *" style={inp2}/>
              <input value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})} placeholder="Descripción" style={inp2}/>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                <input value={form.categoria} onChange={e=>setForm({...form,categoria:e.target.value})} placeholder="Categoría" style={inp2}/>
                <input value={form.importe} onChange={e=>setForm({...form,importe:e.target.value})} placeholder="Importe €*" type="number" style={inp2}/>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                <button onClick={() => setShowForm(null)} style={{ padding:10, borderRadius:9, background:"#27272A", border:"none", color:"#A1A1AA", fontWeight:600, cursor:"pointer" }}>Cancelar</button>
                <button onClick={() => addGasto(myCard.id)} style={{ padding:10, borderRadius:9, background:"#6366F1", border:"none", color:"white", fontWeight:700, cursor:"pointer" }}>Añadir</button>
              </div>
            </div>
          </div>
        )}

        <div style={{ background:"#18181B", border:"1px solid #27272A", borderRadius:14, overflow:"hidden" }}>
          {myGastos.length === 0 && <div style={{ padding:32, textAlign:"center", color:"#52525B", fontSize:14 }}>Añade tu primer gasto</div>}
          {myGastos.map((g, i) => (
            <div key={g.id} style={{ padding:"14px 16px", borderBottom:i<myGastos.length-1?"1px solid #27272A":"none", display:"flex", alignItems:"flex-start", gap:12 }}>
              <div style={{ borderLeft:"3px solid #EF4444", paddingLeft:10, flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div>
                    <div style={{ fontWeight:700, fontSize:14, color:"#FAFAFA" }}>{g.proveedor}</div>
                    <div style={{ fontSize:12, color:"#71717A", marginTop:2 }}>{g.categoria} · {g.fecha}</div>
                    {g.desc && <div style={{ fontSize:12, color:"#A1A1AA", marginTop:2 }}>{g.desc}</div>}
                    {!g.confirmado && <div style={{ marginTop:6, display:"inline-flex", alignItems:"center", gap:4, background:"#EF444420", border:"1px solid #EF4444", borderRadius:20, padding:"2px 10px", fontSize:11, color:"#EF4444", fontWeight:600 }}>⚠️ Sin confirmación</div>}
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
                    <div style={{ fontWeight:700, color:"#EF4444", fontSize:15 }}>{g.importe.toFixed(2)} €</div>
                    <button onClick={() => setEditGasto({...g, cardId:myCard.id})} style={{ width:28, height:28, borderRadius:8, background:"#27272A", border:"none", cursor:"pointer", fontSize:14 }}>✏️</button>
                    <button onClick={() => deleteGasto(myCard.id, g.id)} style={{ width:28, height:28, borderRadius:8, background:"#27272A", border:"none", cursor:"pointer", fontSize:14 }}>🗑️</button>
                  </div>
                </div>
              </div>
            </div>
          ))}
          {myGastos.length > 0 && (
            <div style={{ padding:"12px 16px", background:"#0F0F13", display:"flex", justifyContent:"space-between" }}>
              <span style={{ fontWeight:800, fontSize:15, color:"#FAFAFA" }}>Total</span>
              <span style={{ fontWeight:800, fontSize:15, color:"#FAFAFA" }}>{myTotal.toFixed(2)} €</span>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ADMIN VIEW
  const month = "Junio 2026";
  return (
    <div style={{ padding:"16px" }}>
      {/* Stats */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:20 }}>
        {[
          { label:"Tarjetas activas",    value:cards.length },
          { label:"Empleados",           value:cards.length },
          { label:"Gastos registrados",  value:allGastos.length },
          { label:"Total gastado",       value:`${totalGastado.toLocaleString("es-ES",{minimumFractionDigits:2})} €` },
        ].map((s,i) => (
          <div key={i} style={{ background:"#18181B", border:"1px solid #27272A", borderRadius:12, padding:"16px" }}>
            <div style={{ fontSize:24, fontWeight:800, color:"#FAFAFA" }}>{s.value}</div>
            <div style={{ fontSize:12, color:"#71717A", marginTop:2 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12, flexWrap:"wrap", gap:8 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:16 }}>📋</span>
          <span style={{ fontWeight:700, fontSize:15, color:"#FAFAFA" }}>Registro de tarjetas</span>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button style={{ padding:"7px 14px", borderRadius:8, background:"#18181B", border:"1px solid #27272A", color:"#10B981", fontWeight:600, fontSize:12, cursor:"pointer" }}>⬇ Excel</button>
          <button style={{ padding:"7px 14px", borderRadius:8, background:"#18181B", border:"1px solid #27272A", color:"#E4E4E7", fontWeight:600, fontSize:12, cursor:"pointer" }}>+ Manual</button>
          <button onClick={() => setShowAssign(true)} style={{ padding:"7px 14px", borderRadius:8, background:"#6366F1", border:"none", color:"white", fontWeight:700, fontSize:12, cursor:"pointer" }}>+ Asignar</button>
        </div>
      </div>

      {/* Month badge */}
      <div style={{ display:"inline-block", background:"#F97316", borderRadius:20, padding:"5px 14px", fontSize:13, fontWeight:700, color:"white", marginBottom:14 }}>{month}</div>

      {/* Assign modal */}
      {showAssign && (
        <div style={{ background:"#18181B", border:"1px solid #6366F1", borderRadius:14, padding:18, marginBottom:14 }}>
          <div style={{ fontWeight:700, fontSize:15, color:"#FAFAFA", marginBottom:12 }}>Nueva tarjeta</div>
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <input value={newCard.last4} onChange={e=>setNewCard({...newCard,last4:e.target.value})} placeholder="Últimos 4 dígitos *" style={inp2}/>
              <input value={newCard.titular} onChange={e=>setNewCard({...newCard,titular:e.target.value})} placeholder="Titular *" style={inp2}/>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <input value={newCard.entregada} onChange={e=>setNewCard({...newCard,entregada:e.target.value})} placeholder="Fecha entrega" style={inp2}/>
              <input value={newCard.coche} onChange={e=>setNewCard({...newCard,coche:e.target.value})} placeholder="Coche" style={inp2}/>
            </div>
            <input value={newCard.evento} onChange={e=>setNewCard({...newCard,evento:e.target.value})} placeholder="Evento / Uso" style={inp2}/>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <button onClick={() => setShowAssign(false)} style={{ padding:10, borderRadius:9, background:"#27272A", border:"none", color:"#A1A1AA", fontWeight:600, cursor:"pointer" }}>Cancelar</button>
              <button onClick={addCard} style={{ padding:10, borderRadius:9, background:"#6366F1", border:"none", color:"white", fontWeight:700, cursor:"pointer" }}>Asignar</button>
            </div>
          </div>
        </div>
      )}

      {/* Cards table */}
      <div style={{ background:"#F97316", borderRadius:14, overflow:"hidden" }}>
        {/* Table header */}
        <div style={{ display:"grid", gridTemplateColumns:"32px 1fr 1fr 80px 1fr 90px", padding:"10px 14px", gap:8 }}>
          {["","F. ENTREGA","RESPONSABLE","COCHE","EVENTO/USO","TOTAL"].map((h,i) => (
            <div key={i} style={{ fontSize:11, fontWeight:800, color:"white", letterSpacing:"0.05em" }}>{h}</div>
          ))}
        </div>
        {/* Rows */}
        {cards.map(card => {
          const cardGastos = expenses[card.id] || [];
          const cardTotal = cardGastos.reduce((s,g) => s+g.importe, 0);
          const isExp = expanded[card.id];
          return (
            <div key={card.id} style={{ background:"#18181B", borderTop:"1px solid #27272A" }}>
              <div onClick={() => setExpanded(prev => ({...prev,[card.id]:!prev[card.id]}))}
                style={{ display:"grid", gridTemplateColumns:"32px 1fr 1fr 80px 1fr 90px", padding:"12px 14px", gap:8, cursor:"pointer", alignItems:"center" }}>
                <div style={{ color:"#F97316", fontSize:14 }}>{isExp?"▼":"▶"}</div>
                <div style={{ fontSize:13, color:"#A1A1AA" }}>{card.entregada}</div>
                <div style={{ fontSize:14, fontWeight:700, color:"#FAFAFA" }}>{card.titular}</div>
                <div style={{ fontSize:12, color:"#71717A" }}>{card.coche}</div>
                <div style={{ fontSize:12, color:"#71717A" }}>{card.evento}</div>
                <div style={{ fontSize:14, fontWeight:700, color:cardTotal>0?"#F97316":"#52525B" }}>{cardTotal>0?`${cardTotal.toFixed(0)} €`:"—"}</div>
              </div>
              {/* Expanded gastos */}
              {isExp && (
                <div style={{ background:"#0F0F13", borderTop:"1px solid #27272A" }}>
                  {cardGastos.length === 0 && <div style={{ padding:"12px 20px", color:"#52525B", fontSize:13 }}>Sin gastos registrados</div>}
                  {cardGastos.map(g => (
                    <div key={g.id} style={{ padding:"10px 20px", borderBottom:"1px solid #1F1F23", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div>
                        <div style={{ fontSize:13, fontWeight:600, color:"#FAFAFA" }}>{g.proveedor}</div>
                        <div style={{ fontSize:11, color:"#71717A" }}>{g.categoria} · {g.fecha}</div>
                        {g.desc && <div style={{ fontSize:11, color:"#A1A1AA" }}>{g.desc}</div>}
                        {!g.confirmado && <span style={{ fontSize:10, color:"#F97316", fontWeight:600 }}>⚠️ Sin confirmación</span>}
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                        <div style={{ fontWeight:700, color:"#F97316", fontSize:14 }}>{g.importe.toFixed(2)} €</div>
                        <button onClick={() => confirmGasto(card.id, g.id)} style={{ padding:"4px 10px", borderRadius:6, background:"#10B981", border:"none", color:"white", fontWeight:600, fontSize:11, cursor:"pointer" }}>✓ OK</button>
                      </div>
                    </div>
                  ))}
                  <div style={{ padding:"8px 20px", display:"flex", justifyContent:"space-between" }}>
                    <span style={{ fontSize:12, color:"#71717A" }}>····  {card.last4}</span>
                    <button onClick={() => setShowForm(card.id)} style={{ padding:"5px 12px", borderRadius:7, background:"#6366F1", border:"none", color:"white", fontWeight:600, fontSize:12, cursor:"pointer" }}>+ Gasto manual</button>
                  </div>
                  {showForm === card.id && (
                    <div style={{ padding:"12px 20px", background:"#18181B" }}>
                      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                        <input value={form.proveedor} onChange={e=>setForm({...form,proveedor:e.target.value})} placeholder="Proveedor *" style={inp2}/>
                        <input value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})} placeholder="Descripción" style={inp2}/>
                        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                          <input value={form.categoria} onChange={e=>setForm({...form,categoria:e.target.value})} placeholder="Categoría" style={inp2}/>
                          <input value={form.importe} onChange={e=>setForm({...form,importe:e.target.value})} placeholder="Importe €*" type="number" style={inp2}/>
                        </div>
                        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                          <button onClick={()=>setShowForm(null)} style={{ padding:9, borderRadius:8, background:"#27272A", border:"none", color:"#A1A1AA", fontWeight:600, cursor:"pointer" }}>Cancelar</button>
                          <button onClick={()=>addGasto(card.id)} style={{ padding:9, borderRadius:8, background:"#6366F1", border:"none", color:"white", fontWeight:700, cursor:"pointer" }}>Añadir</button>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── STAFF TASKS DATA ───────────────────────────────────
const STAFF_TASKS = [
  { id:1, personId:14, date:"2026-06-23", title:"Llevar el MAN a Autoprima para reparación", type:"logistica", vehicle:"MAN", icon:"🚛" },
];

const TYPE_COLORS_STAFF = {
  mecanico:  { bg:"#6366F120", border:"#6366F1", text:"#6366F1",  label:"Mecánico"   },
  ingeniero: { bg:"#10B98120", border:"#10B981", text:"#10B981",  label:"Ingeniero"  },
  logistica: { bg:"#F9731620", border:"#F97316", text:"#F97316",  label:"Logística"  },
  admin:     { bg:"#F59E0B20", border:"#F59E0B", text:"#F59E0B",  label:"Admin"      },
};

function StaffTab({ user, isAdmin }) {
  const today = new Date(2026, 5, 20); // June 20 2026
  const [currentMonth, setCurrentMonth] = useState({ year:2026, month:5 }); // 0-indexed
  const [selectedDate, setSelectedDate] = useState("2026-06-23");
  const [tasks, setTasks] = useState(STAFF_TASKS);

  const { year, month } = currentMonth;
  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const startOffset = (firstDay + 6) % 7; // Mon=0

  const MONTH_NAMES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const DAY_NAMES = ["L","M","X","J","V","S","D"];

  const myTasks = tasks.filter(t => {
    if (isAdmin) return true;
    return t.personId === user.id;
  });

  const tasksForDate = (dateStr) => myTasks.filter(t => t.date === dateStr);

  const hasTask = (day) => {
    const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    return tasksForDate(dateStr).length > 0;
  };

  const selectedTasks = tasksForDate(selectedDate);

  const formatDateLabel = (dateStr) => {
    const d = new Date(dateStr+"T12:00:00");
    return d.toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"});
  };

  const getUserName = (personId) => {
    const u = TEAM_MEMBERS.find(m => m.id === personId);
    return u ? u.name : "—";
  };

  return (
    <div style={{ maxWidth:600, margin:"0 auto", padding:"20px" }}>
      {/* Month nav */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
        <button onClick={() => setCurrentMonth(prev => {
          const d = new Date(prev.year, prev.month-1, 1);
          return { year:d.getFullYear(), month:d.getMonth() };
        })} style={{ width:36, height:36, borderRadius:"50%", background:"#27272A", border:"none", color:"#E4E4E7", cursor:"pointer", fontSize:16 }}>‹</button>
        <div style={{ fontWeight:800, fontSize:17, color:"#FAFAFA" }}>{MONTH_NAMES[month]} {year}</div>
        <button onClick={() => setCurrentMonth(prev => {
          const d = new Date(prev.year, prev.month+1, 1);
          return { year:d.getFullYear(), month:d.getMonth() };
        })} style={{ width:36, height:36, borderRadius:"50%", background:"#27272A", border:"none", color:"#E4E4E7", cursor:"pointer", fontSize:16 }}>›</button>
      </div>

      {/* Calendar grid */}
      <div style={{ background:"#18181B", border:"1px solid #27272A", borderRadius:14, padding:16, marginBottom:16 }}>
        {/* Day headers */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:8 }}>
          {DAY_NAMES.map(d => (
            <div key={d} style={{ textAlign:"center", fontSize:11, fontWeight:700, color:"#71717A", padding:"4px 0" }}>{d}</div>
          ))}
        </div>
        {/* Days */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
          {Array.from({length:startOffset}).map((_,i) => <div key={`e${i}`}/>)}
          {Array.from({length:daysInMonth}).map((_,i) => {
            const day = i+1;
            const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const isToday = dateStr === "2026-06-20";
            const isSelected = dateStr === selectedDate;
            const hasTasks = hasTask(day);
            return (
              <div key={day} onClick={() => setSelectedDate(dateStr)}
                style={{
                  aspectRatio:"1", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                  borderRadius:10, cursor:"pointer", position:"relative",
                  background: isSelected ? "#6366F1" : isToday ? "#6366F120" : "transparent",
                  border: isToday && !isSelected ? "1px solid #6366F1" : "1px solid transparent",
                }}>
                <span style={{ fontSize:14, fontWeight:isSelected||isToday?700:400, color:isSelected?"white":"#E4E4E7" }}>{day}</span>
                {hasTasks && <div style={{ width:5, height:5, borderRadius:"50%", background:isSelected?"white":"#F97316", marginTop:2 }}/>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Selected day tasks */}
      <div>
        <div style={{ fontWeight:700, fontSize:14, color:"#FAFAFA", marginBottom:10, textTransform:"capitalize" }}>
          {formatDateLabel(selectedDate)}
        </div>
        {selectedTasks.length === 0 ? (
          <div style={{ background:"#18181B", border:"1px solid #27272A", borderRadius:12, padding:32, textAlign:"center", color:"#52525B", fontSize:14 }}>
            Sin tareas asignadas para este día
          </div>
        ) : (
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {selectedTasks.map(task => {
              const tc = TYPE_COLORS_STAFF[task.type] || TYPE_COLORS_STAFF.admin;
              return (
                <div key={task.id} style={{ background:"#18181B", border:`1px solid #27272A`, borderLeft:`4px solid ${tc.border}`, borderRadius:12, padding:16 }}>
                  <div style={{ display:"flex", alignItems:"flex-start", gap:12 }}>
                    <div style={{ width:40, height:40, borderRadius:10, background:tc.bg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>{task.icon}</div>
                    <div style={{ flex:1 }}>
                      {isAdmin && (
                        <div style={{ fontSize:11, fontWeight:700, color:tc.text, marginBottom:4, letterSpacing:"0.05em" }}>
                          {getUserName(task.personId)} · {tc.label}
                        </div>
                      )}
                      <div style={{ fontWeight:700, fontSize:14, color:"#FAFAFA", marginBottom:task.vehicle?4:0 }}>{task.title}</div>
                      {task.vehicle && (
                        <div style={{ display:"inline-flex", alignItems:"center", gap:4, background:"#27272A", borderRadius:20, padding:"2px 10px", fontSize:11, color:"#A1A1AA", marginTop:4 }}>
                          🚗 {task.vehicle}
                        </div>
                      )}
                    </div>
                    <div style={{ padding:"3px 10px", borderRadius:20, fontSize:11, fontWeight:600, background:tc.bg, color:tc.text, flexShrink:0 }}>{tc.label}</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
